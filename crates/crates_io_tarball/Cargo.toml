[package]
name = "crates_io_tarball"
version = "0.0.0"
license = "MIT OR Apache-2.0"
edition = "2024"

[lints]
workspace = true

[features]
builder = ["dep:flate2", "dep:tar"]

[dependencies]
astral-tokio-tar = "=0.6.0"
cargo-manifest = "=0.19.1"
flate2 = { version = "=1.1.9", optional = true }
serde = { version = "=1.0.228", features = ["derive"] }
serde_json = "=1.0.149"
tar = { version = "=0.4.45", optional = true }
thiserror = "=2.0.18"
tracing = "=0.1.44"
tokio = { version = "=1.51.1", features = ["io-util", "macros", "rt-multi-thread"] }
async-compression = { version = "=0.4.41", default-features = false, features = ["gzip", "tokio"] }
futures-util = "=0.3.32"

[dev-dependencies]
anyhow = "=1.0.102"
claims = "=0.8.0"
clap = { version = "=4.6.0", features = ["derive", "unicode", "wrap_help"] }
flate2 = { version = "=1.1.9" }
indicatif = { version = "=0.18.4", features = ["rayon"] }
insta = "=1.47.2"
rayon = "=1.12.0"
tar = { version = "=0.4.45" }
tracing-subscriber = { version = "=0.3.23", features = ["env-filter"] }
walkdir = "=2.5.0"
