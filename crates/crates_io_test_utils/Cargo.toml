[package]
name = "crates_io_test_utils"
version = "0.0.0"
license = "MIT OR Apache-2.0"
repository = "https://github.com/rust-lang/crates.io"
description = "Test utilities for crates.io"
edition = "2024"
publish = false

[lints]
workspace = true

[dependencies]
anyhow = "=1.0.102"
bytes = "=1.11.1"
chrono = "=0.4.45"
crates_io_api_types = { path = "../crates_io_api_types" }
crates_io_cargo_toml = { path = "../crates_io_cargo_toml" }
crates_io_database = { path = "../crates_io_database" }
crates_io_tarball = { path = "../crates_io_tarball", features = ["builder"] }
diesel = "=2.3.10"
diesel-async = "=0.9.1"
semver = "=1.0.28"
serde_json = "=1.0.150"
toml = "=1.1.2"
