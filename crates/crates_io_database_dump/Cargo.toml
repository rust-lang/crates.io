[package]
name = "crates_io_database_dump"
version = "0.0.0"
license = "MIT OR Apache-2.0"
edition = "2024"

[lints]
workspace = true

[dependencies]
anyhow = "=1.0.102"
chrono = { version = "=0.4.44", default-features = false, features = ["clock", "serde"] }
crates_io_version = { path = "../crates_io_version" }
flate2 = "=1.1.9"
minijinja = "=2.19.0"
serde = { version = "=1.0.228", features = ["derive"] }
serde_json = "=1.0.149"
tar = "=0.4.45"
tempfile = "=3.27.0"
toml = "=1.1.2"
tracing = "=0.1.44"
zip = { version = "=8.5.1", default-features = false, features = ["deflate"] }

[dev-dependencies]
crates_io_test_db = { path = "../crates_io_test_db" }
diesel = "=2.3.7"
diesel-async = { version = "=0.8.0", features = ["postgres"] }
insta = { version = "=1.47.2", features = ["glob"] }
tokio = { version = "=1.51.1", features = ["macros", "rt"] }
