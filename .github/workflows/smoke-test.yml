name: Smoke Test

on:
  workflow_dispatch:

permissions: {}

concurrency:
  group: smoke-test
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-24.04

    permissions:
      id-token: write # needed by `crates-io-auth-action` to mint an OIDC token for Trusted Publishing

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo build --package crates_io_smoke_test

      - uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5
        id: auth
        with:
          url: https://staging.crates.io

      - run: cargo run --package crates_io_smoke_test --quiet
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
