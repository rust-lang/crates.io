<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'sha256-dbf9FMl76C7BnK1CC3eWb3pvsQAUaTYSHAlBy9tNTG0='">
  <title>crates.io OAuth Redirect</title>
  <script>
    var params = new URLSearchParams(location.search);
    var code = params.get('code');
    var state = params.get('state');

    if (window.opener) {
      window.opener.postMessage({ code: code, state: state }, window.location.origin);
    }
  </script>
</head>
</html>
