x-backend: &backend
  build:
    context: .
    dockerfile: backend.Dockerfile
  environment:
    DEV_DOCKER: 'true'
    DATABASE_URL: postgres://postgres:password@postgres/cargo_registry
    SESSION_KEY: badkeyabcdefghijklmnopqrstuvwxyzabcdef
    GIT_REPO_URL: file:///app/tmp/index-bare
    GH_CLIENT_ID: ''
    GH_CLIENT_SECRET: ''
    WEB_ALLOWED_ORIGINS: http://localhost:8888,http://localhost:5173
  links:
    - postgres
  volumes:
    # Mount the src/ directory so we don't have to rebuild the Docker image
    # when we want to change some code
    - ./src:/app/src:ro

    - index:/app/tmp
    - cargo-cache:/usr/local/cargo/registry
    - target-cache:/app/target
    - local-uploads:/app/local_uploads

services:
  postgres:
    image: postgres:16@sha256:1bf73ccae25238fa555100080042f0b2f9be08eb757e200fe6afc1fc413a1b3c
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - 127.0.0.1:5432:5432
    volumes:
      - ./docker/docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d
      - postgres-data:/var/lib/postgresql/data

  backend:
    <<: *backend
    ports:
      - 8888:8888
    depends_on:
      - postgres

  worker:
    <<: *backend
    entrypoint: cargo run --bin background-worker
    depends_on:
      - backend

  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    entrypoint: pnpm --filter crates.io-svelte dev:docker
    links:
      - backend
    ports:
      - 5173:5173
    volumes:
      # Mount the svelte/ sources so live reload works
      - ./svelte/src:/app/svelte/src:ro
      - ./svelte/static:/app/svelte/static:ro

volumes:
  postgres-data:
  cargo-cache:
  target-cache:
  index:
  local-uploads:
